<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BrightPath - Profile</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <h1>BrightPath</h1>
  </header>
  <main class="container">
    <div class="hero">
      <div>
        <h2>Your profile</h2>
        <p class="muted">Tell us about your skills and interests so we can recommend suitable career paths.</p>
      </div>
      <div class="controls">
        <a class="btn secondary" href="index.html">&larr; Home</a>
      </div>
    </div>

    <div class="card">
      <form id="profileForm">
        <label for="skills">Skills (comma-separated)</label>
        <p class="field-help">Add at least one skill. Example: python, communication, sql</p>
        <div class="field-meta"><span id="skillsHint" class="field-hint"></span><span id="skillsCount" class="field-count">0 / 20</span></div>
        <input id="skills" placeholder="e.g. python, data analysis, communication" aria-label="skills" required />
        <p id="skillsError" class="field-error" aria-live="polite"></p>

        <label for="interests">Interests (comma-separated)</label>
        <p class="field-help">Optional, but improves recommendation quality.</p>
        <div class="field-meta"><span id="interestsHint" class="field-hint"></span><span id="interestsCount" class="field-count">0 / 15</span></div>
        <input id="interests" placeholder="e.g. AI, healthcare, education" aria-label="interests" />
        <p id="interestsError" class="field-error" aria-live="polite"></p>

        <label for="education">Education level</label>
        <select id="education" aria-label="education">
          <option>High School</option>
          <option>Associate</option>
          <option selected>Bachelor</option>
          <option>Master</option>
          <option>PhD</option>
        </select>
        <p id="educationError" class="field-error" aria-live="polite"></p>

        <div id="formError" class="form-alert is-hidden" role="alert" aria-live="assertive"></div>

        <label class="setting-row" for="toastAutoFocusToggle">
          <input id="toastAutoFocusToggle" type="checkbox" checked />
          <span>Enable toast auto-focus for keyboard users</span>
        </label>

        <div class="btn-row">
          <button class="btn" type="submit">Get Recommendations</button>
          <button type="button" class="btn secondary" onclick="qs('skills').value='';qs('interests').value='';qs('education').selectedIndex=2">Reset</button>
        </div>
      </form>
    </div>
  </main>
  <footer class="footer">BrightPath</footer>
  <script src="js/firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
